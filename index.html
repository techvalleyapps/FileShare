<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>FileShare</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@500;600;700;800&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #07070d;
  --bg2:     #0e0e18;
  --bg3:     #15151f;
  --bg4:     #1c1c28;
  --border:  rgba(255,255,255,.07);
  --border2: rgba(255,255,255,.14);
  --text:    #eceaf8;
  --muted:   #5e5b78;
  --muted2:  #8c89a8;
  --accent:  #7ee8a2;
  --accent2: #38d98a;
  --accentd: #1a6640;
  --blue:    #6ab4f5;
  --warn:    #f0a045;
  --danger:  #e05a5a;
  --mono:    'DM Mono', monospace;
  --sans:    'Syne', sans-serif;
}

html, body {
  min-height: 100dvh;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  overflow-x: hidden;
}

/* ── TOPBAR ── */
.topbar {
  display: flex; align-items: center; gap: 12px;
  padding: 0 20px; height: 54px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: sticky; top: 0; z-index: 100;
}
.logo {
  width: 30px; height: 30px; background: var(--accent);
  border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.logo svg { width: 15px; height: 15px; }
.brand { font-size: 15px; font-weight: 800; letter-spacing: -.03em; }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.status-pill {
  display: flex; align-items: center; gap: 5px; padding: 4px 11px;
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: 20px; font-family: var(--mono); font-size: 11px; color: var(--muted2);
}
.sdot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--muted); flex-shrink: 0; transition: background .3s;
}
.sdot.starting   { background: var(--warn);   animation: blink 1s ease-in-out infinite; }
.sdot.hub        { background: var(--accent);  animation: blink 2.5s ease-in-out infinite; }
.sdot.peer       { background: var(--blue);    box-shadow: 0 0 5px var(--blue); }
.sdot.error      { background: var(--danger); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }

.members-badge {
  display: flex; align-items: center; gap: 5px;
  padding: 4px 10px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 20px; font-family: var(--mono); font-size: 11px; color: var(--muted2);
}
.members-badge span { color: var(--accent); font-weight: 600; }

/* ── LAYOUT ── */
.layout {
  display: grid;
  grid-template-columns: 1fr;
  max-width: 720px;
  margin: 0 auto;
  padding: 20px 20px 60px;
  gap: 0;
}

/* ── UPLOAD AREA ── */
.upload-section { display: flex; flex-direction: column; gap: 12px; }

.drop-zone {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  border: 2px dashed var(--border2); border-radius: 14px;
  padding: 28px 20px; cursor: pointer;
  transition: border-color .2s, background .2s;
  text-align: center; position: relative;
  min-height: 130px;
}
.drop-zone.over { border-color: var(--accent); background: rgba(126,232,162,.04); }
.drop-zone:hover { border-color: var(--border2); }
.dz-icon { font-size: 26px; margin-bottom: 8px; }
.dz-title { font-size: 16px; font-weight: 700; letter-spacing: -.02em; margin-bottom: 3px; }
.dz-sub   { font-size: 12px; color: var(--muted2); font-family: var(--mono); }
.file-input { display: none; }
@media (max-width: 500px) { .drop-zone { min-height: 100px; padding: 20px; } .dz-title { font-size: 14px; } }

/* ── TEXT BOX ── */
.text-section-divider {
  display: flex; align-items: center; gap: 10px; margin: 16px 0 0;
}
.text-section-divider::before,
.text-section-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.text-section-divider span {
  font-size: 10px; font-family: var(--mono); color: var(--muted);
  text-transform: uppercase; letter-spacing: .08em;
}

.text-box-wrap { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
.text-textarea {
  width: 100%; min-height: 90px;
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: 10px; padding: 11px 13px;
  font-family: var(--mono); font-size: 13px; color: var(--text);
  resize: vertical; outline: none; line-height: 1.6; transition: border-color .2s;
}
.text-textarea:focus { border-color: var(--accent); }
.text-textarea::placeholder { color: var(--muted); font-size: 12px; }

.text-send-row { display: flex; align-items: center; gap: 8px; }
.send-btn {
  padding: 8px 18px; background: var(--accent); color: #05140c;
  border: none; border-radius: 8px; font-family: var(--sans); font-size: 13px; font-weight: 700;
  cursor: pointer; transition: background .15s; white-space: nowrap;
}
.send-btn:hover  { background: #9ef5b8; }
.send-btn:active { transform: scale(.97); }
.char-count { font-size: 11px; font-family: var(--mono); color: var(--muted); margin-left: auto; }

/* ── SHELF (shared items) ── */
.shelf-divider {
  display: flex; align-items: center; gap: 10px; margin: 24px 0 16px;
}
.shelf-divider::before,
.shelf-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.shelf-divider span {
  font-size: 10px; font-family: var(--mono); color: var(--muted);
  text-transform: uppercase; letter-spacing: .08em; white-space: nowrap;
}

.shelf { display: flex; flex-direction: column; gap: 10px; }

.shelf-empty {
  text-align: center; padding: 28px 20px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 12px;
  font-size: 13px; font-family: var(--mono); color: var(--muted); line-height: 1.7;
}

/* ── SHELF ITEM ── */
.shelf-item {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 16px;
  display: flex; align-items: flex-start; gap: 12px;
  animation: fadeUp .2s ease;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

.item-icon {
  width: 38px; height: 38px; border-radius: 9px;
  background: var(--bg4); border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}

.item-body { flex: 1; min-width: 0; }

.item-name {
  font-size: 14px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 3px;
}

.item-meta {
  font-size: 11px; color: var(--muted2); font-family: var(--mono);
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}

.item-from {
  background: var(--bg4); border-radius: 4px;
  padding: 1px 6px; font-size: 10px; color: var(--muted);
}
.item-from.mine { color: var(--accent); background: var(--accentd); }

/* text items */
.item-text-body {
  margin-top: 8px; padding: 10px 12px;
  background: var(--bg4); border-radius: 8px;
  font-family: var(--mono); font-size: 13px; color: var(--text);
  white-space: pre-wrap; word-break: break-word; line-height: 1.6;
  max-height: 160px; overflow-y: auto;
}

.item-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; margin-top: 2px; }

.save-btn {
  padding: 5px 12px;
  background: var(--bg4); border: 1px solid var(--border2);
  border-radius: 6px; font-size: 11px; font-family: var(--mono);
  color: var(--accent); cursor: pointer;
  transition: background .15s, border-color .15s;
  white-space: nowrap; text-decoration: none; display: inline-block;
}
.save-btn:hover { background: var(--accentd); border-color: var(--accent); }

.copy-btn {
  padding: 5px 12px;
  background: var(--bg4); border: 1px solid var(--border2);
  border-radius: 6px; font-size: 11px; font-family: var(--mono);
  color: var(--muted2); cursor: pointer;
  transition: color .2s, border-color .2s;
  white-space: nowrap;
}
.copy-btn:hover  { color: var(--accent); border-color: var(--accent); }
.copy-btn.copied { color: var(--accent2); border-color: var(--accent2); background: var(--accentd); }

/* ── SENDING PROGRESS ── */
.sending-bar-wrap {
  height: 3px; background: var(--bg4); border-radius: 2px; margin-top: 8px; overflow: hidden;
}
.sending-bar {
  height: 100%; background: var(--accent); border-radius: 2px; transition: width .15s;
}

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(14px);
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: 8px; padding: 9px 18px;
  font-size: 12px; font-family: var(--mono);
  opacity: 0; transition: opacity .22s, transform .22s;
  pointer-events: none; z-index: 9999;
  white-space: nowrap; max-width: 90vw; overflow: hidden; text-overflow: ellipsis;
}
.toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>

<header class="topbar">
  <div class="logo">
    <svg viewBox="0 0 15 15" fill="none">
      <path d="M1 7.5h13M7.5 1l6.5 6.5-6.5 6.5" stroke="#05140c" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <span class="brand">FileShare</span>
  <div class="topbar-right">
    <div class="members-badge">&#128101; <span id="member-count">1</span> here</div>
    <div class="status-pill">
      <div class="sdot starting" id="sdot"></div>
      <span id="stext">Connecting&hellip;</span>
    </div>
  </div>
</header>

<div class="layout">

  <!-- Upload -->
  <div class="upload-section">

    <div class="drop-zone" id="drop-zone">
      <input type="file" class="file-input" id="file-input" multiple>
      <div class="dz-icon">&#128229;</div>
      <div class="dz-title">Drop files here or tap to browse</div>
      <div class="dz-sub">Files go to everyone on this page &middot; Any size</div>
    </div>

    <div class="text-section-divider"><span>Or send text</span></div>

    <div class="text-box-wrap">
      <textarea class="text-textarea" id="text-input"
        placeholder="Type or paste a link, note, password…&#10;Ctrl+Enter to send"></textarea>
      <div class="text-send-row">
        <button class="send-btn" id="send-text-btn">Send</button>
        <span class="char-count" id="char-count">0 / 5000</span>
      </div>
    </div>

  </div>

  <!-- Shelf -->
  <div class="shelf-divider"><span>Shared items</span></div>

  <div class="shelf" id="shelf">
    <div class="shelf-empty" id="shelf-empty">
      Nothing shared yet.<br>
      Drop a file or send text — it appears here for everyone on this page.
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════
//  CONFIG
//  The hub peer ID is derived from the page URL so everyone
//  on the same URL automatically connects to the same hub.
// ═══════════════════════════════════════════════════════════

// Stable hub ID derived from hostname + pathname (same for everyone on this URL)
var HUB_ID = (function(){
  var raw = location.hostname + location.pathname;
  // Simple hash → 8 hex chars, prefixed to avoid collisions with other PeerJS users
  var h = 0;
  for(var i=0;i<raw.length;i++){ h = Math.imul(31,h)+raw.charCodeAt(i)|0; }
  return 'fshr-room-' + (h>>>0).toString(16).padStart(8,'0');
})();

var CHUNK = 65536;
var ICE   = { iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:global.stun.twilio.com:3478'}] };

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
var role      = null;       // 'hub' | 'peer'
var myPeer    = null;
var peerConns = {};         // hub: id→conn map of all peers
var hubConn   = null;       // peer: single conn to hub

// Shelf: array of item objects (persists in memory)
// { id, type:'file'|'text', name?, size?, mime?, blob?, text?, from, time }
var shelf = [];

var memberCount = 1;        // includes self

// ═══════════════════════════════════════════════════════════
//  BOOT — try to be hub first; if taken, be peer
// ═══════════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', function(){
  wireEvents();
  startAsHub();
});

function startAsHub(){
  role = 'hub';
  if(myPeer && !myPeer.destroyed) myPeer.destroy();
  myPeer = new Peer(HUB_ID, { debug:0, config:ICE });

  myPeer.on('open', function(){
    setStat('hub', 'Hub \u00b7 ready');
    setCount(1);
  });

  myPeer.on('connection', function(conn){ acceptPeer(conn); });

  myPeer.on('error', function(err){
    if(err.type === 'unavailable-id'){
      // Hub already exists — become a peer
      startAsPeer();
    } else {
      setStat('error', 'Error: '+err.type);
      // Retry hub after a delay
      setTimeout(startAsHub, 4000);
    }
  });

  myPeer.on('disconnected', function(){
    if(myPeer && !myPeer.destroyed) myPeer.reconnect();
  });
}

function startAsPeer(){
  role = 'peer';
  if(myPeer && !myPeer.destroyed) myPeer.destroy();
  myPeer = new Peer({ debug:0, config:ICE });

  myPeer.on('open', function(){
    setStat('starting', 'Joining\u2026');
    hubConn = myPeer.connect(HUB_ID, { reliable:true, serialization:'raw' });

    hubConn.on('open', function(){
      setStat('peer', 'Connected');
      toast('Joined the room!');
    });

    hubConn.on('data', function(raw){
      var msg = tryParse(raw);
      if(msg) handleControl(msg, 'hub');
      else     handleChunk(raw, 'hub');
    });

    hubConn.on('close', function(){
      // Hub left — try to become hub
      setStat('starting', 'Reconnecting\u2026');
      hubConn = null;
      setTimeout(startAsHub, 1000);
    });

    hubConn.on('error', function(){
      setTimeout(startAsHub, 2000);
    });

    // Timeout: if hub doesn't exist yet, become hub
    setTimeout(function(){
      if(hubConn && !hubConn.open){
        startAsHub();
      }
    }, 6000);
  });

  myPeer.on('error', function(err){
    if(err.type !== 'peer-unavailable') startAsHub();
  });
}

// ═══════════════════════════════════════════════════════════
//  HUB: accept incoming peer
// ═══════════════════════════════════════════════════════════
function acceptPeer(conn){
  var id = conn.peer;

  conn.on('open', function(){
    peerConns[id] = conn;
    memberCount = 1 + Object.keys(peerConns).length;
    setCount(memberCount);
    toast('Someone joined');

    // Send current shelf to new peer
    sendShelfToPeer(conn);

    // Broadcast updated member count to all
    broadcastControl({ type:'COUNT', count: memberCount });
  });

  conn.on('data', function(raw){
    var msg = tryParse(raw);
    if(msg) handleControl(msg, id);
    else     handleChunk(raw, id);
  });

  conn.on('close', function(){
    delete peerConns[id];
    memberCount = 1 + Object.keys(peerConns).length;
    setCount(memberCount);
    broadcastControl({ type:'COUNT', count: memberCount });
    toast('Someone left');
  });

  conn.on('error', function(){
    delete peerConns[id];
    memberCount = 1 + Object.keys(peerConns).length;
    setCount(memberCount);
  });
}

// Send entire current shelf to a single newly-joined peer
function sendShelfToPeer(conn){
  shelf.forEach(function(item){
    if(item.type === 'text'){
      conn.send(enc({ type:'TEXT_ITEM', id:item.id, text:item.text, from:item.from, time:item.time }));
    } else if(item.type === 'file' && item.blob){
      // Send file meta then chunks
      var chunks = Math.ceil(item.blob.size / CHUNK);
      conn.send(enc({ type:'FILE_META', id:item.id, name:item.name, size:item.size, mime:item.mime, chunks:chunks, from:item.from, time:item.time }));
      sendFileChunksToPeer(conn, item.id, item.blob, 0);
    }
  });
}

function sendFileChunksToPeer(conn, itemId, blob, startIndex){
  if(!conn.open) return;
  var chunks = Math.ceil(blob.size / CHUNK);
  var i = startIndex;
  function next(){
    if(!conn.open || i >= chunks) return;
    var sliceBlob = blob.slice(i*CHUNK, (i+1)*CHUNK);
    var reader = new FileReader();
    reader.onload = function(){
      if(!conn.open) return;
      var hdr = encHdr({ type:'CHUNK', id:itemId, index:i });
      var data = reader.result;
      var msg = new Uint8Array(hdr.byteLength + data.byteLength);
      msg.set(hdr); msg.set(new Uint8Array(data), hdr.byteLength);
      try{ conn.send(msg.buffer); } catch(e){ return; }
      i++;
      setTimeout(next, 0);
    };
    reader.readAsArrayBuffer(sliceBlob);
  }
  next();
}

// ═══════════════════════════════════════════════════════════
//  SEND FILES (from any role)
// ═══════════════════════════════════════════════════════════
function sendFiles(files){
  Array.prototype.forEach.call(files, function(file){
    var itemId = uid();
    var total  = Math.ceil(file.size / CHUNK);
    var time   = nowTime();

    // Add to shelf immediately (without blob URL yet — will set after reading)
    var item = { id:itemId, type:'file', name:file.name, size:file.size, mime:file.type||'application/octet-stream', blob:null, from:'You', time:time, total:total, received:0 };
    shelf.push(item);
    addShelfItem(item, true);

    var reader = new FileReader();
    reader.onload = function(){
      var buf    = reader.result;
      var blobObj = new Blob([buf], { type: file.type||'application/octet-stream' });
      item.blob  = blobObj;

      // Set download link now that we have the blob
      var shelfEl = document.getElementById('si-'+itemId);
      if(shelfEl){
        var saveBtn = shelfEl.querySelector('.save-btn');
        if(saveBtn){
          var url = URL.createObjectURL(blobObj);
          saveBtn.href     = url;
          saveBtn.download = file.name;
          saveBtn.textContent = 'Save';
          saveBtn.style.opacity = '1';
        }
        // Remove sending bar
        var barWrap = shelfEl.querySelector('.sending-bar-wrap');
        if(barWrap) barWrap.style.display='none';
      }

      // Send to all peers
      var targets = getTargets();
      if(targets.length === 0) return; // alone — file is already on shelf

      targets.forEach(function(conn){
        conn.send(enc({ type:'FILE_META', id:itemId, name:file.name, size:file.size, mime:file.type||'application/octet-stream', chunks:total, from:'Room', time:time }));
      });

      // Stream chunks
      var i = 0;
      function next(){
        var activeTgts = targets.filter(function(c){ return c.open; });
        if(!activeTgts.length || i >= total) return;
        var hdr   = encHdr({ type:'CHUNK', id:itemId, index:i });
        var slice = buf.slice(i*CHUNK, (i+1)*CHUNK);
        var msg   = new Uint8Array(hdr.byteLength + slice.byteLength);
        msg.set(hdr); msg.set(new Uint8Array(slice), hdr.byteLength);
        activeTgts.forEach(function(c){ try{c.send(msg.buffer);}catch(e){} });
        i++;
        if(i < total) setTimeout(next, 0);
        else {
          targets.forEach(function(c){ try{c.send(enc({type:'FILE_DONE',id:itemId}));}catch(e){} });
          toast('Sent: '+file.name);
        }
      }
      next();
    };
    reader.readAsArrayBuffer(file);
  });
}

// ═══════════════════════════════════════════════════════════
//  SEND TEXT
// ═══════════════════════════════════════════════════════════
function sendText(){
  var ta  = document.getElementById('text-input');
  var txt = ta.value.trim();
  if(!txt) return;

  var itemId = uid();
  var time   = nowTime();
  var item   = { id:itemId, type:'text', text:txt, from:'You', time:time };
  shelf.push(item);
  addShelfItem(item, true);
  ta.value = '';
  document.getElementById('char-count').textContent = '0 / 5000';

  var targets = getTargets();
  targets.forEach(function(c){
    try{ c.send(enc({ type:'TEXT_ITEM', id:itemId, text:txt, from:'Room', time:time })); }catch(e){}
  });

  if(targets.length) toast('Text sent!');
}

// ═══════════════════════════════════════════════════════════
//  RECEIVE — incoming data handler
// ═══════════════════════════════════════════════════════════
// Tracks incoming file transfers: id → { meta, chunks[], received }
var incoming = {};

function handleControl(msg, fromId){
  if(msg.type === 'COUNT'){
    setCount(msg.count);
    return;
  }

  if(msg.type === 'TEXT_ITEM'){
    // Don't duplicate if already on shelf (e.g. re-send on join)
    if(shelf.find(function(x){return x.id===msg.id;})) return;
    var item = { id:msg.id, type:'text', text:msg.text, from:msg.from||'Room', time:msg.time };
    shelf.push(item);
    addShelfItem(item, false);
    // Hub relays to other peers
    if(role==='hub') relayExcept(enc(msg), fromId);
    return;
  }

  if(msg.type === 'FILE_META'){
    if(shelf.find(function(x){return x.id===msg.id;})) return;
    incoming[msg.id] = { name:msg.name, size:msg.size, mime:msg.mime, total:msg.chunks, chunks:new Array(msg.chunks), received:0, from:msg.from||'Room', time:msg.time };
    var item = { id:msg.id, type:'file', name:msg.name, size:msg.size, mime:msg.mime, blob:null, from:msg.from||'Room', time:msg.time };
    shelf.push(item);
    addShelfItem(item, false);
    if(role==='hub') relayExcept(enc(msg), fromId);
    return;
  }

  if(msg.type === 'FILE_DONE'){
    var tf = incoming[msg.id];
    if(!tf) return;
    var blob = new Blob(tf.chunks.map(function(c){return new Uint8Array(c);}), { type:tf.mime });
    var url  = URL.createObjectURL(blob);
    // Update shelf item with blob
    var shelfItem = shelf.find(function(x){return x.id===msg.id;});
    if(shelfItem) shelfItem.blob = blob;
    // Update UI
    var el = document.getElementById('si-'+msg.id);
    if(el){
      var saveBtn = el.querySelector('.save-btn');
      if(saveBtn){ saveBtn.href=url; saveBtn.download=tf.name; saveBtn.textContent='Save'; saveBtn.style.opacity='1'; }
      var barWrap = el.querySelector('.sending-bar-wrap');
      if(barWrap) barWrap.remove();
    }
    delete incoming[msg.id];
    if(role==='hub') relayExcept(enc(msg), fromId);
    toast('Received: '+tf.name);
    return;
  }
}

function handleChunk(raw, fromId){
  var buf;
  if(raw instanceof ArrayBuffer)        buf = new Uint8Array(raw);
  else if(raw instanceof Blob)          { raw.arrayBuffer().then(function(ab){handleChunk(ab,fromId);}); return; }
  else return;

  try{
    var hdr = JSON.parse(new TextDecoder().decode(buf.slice(0,256)).trim());
    if(hdr.type === 'CHUNK'){
      var tf = incoming[hdr.id];
      if(!tf) return;
      tf.chunks[hdr.index] = buf.slice(256);
      tf.received++;
      // Update progress bar
      var el = document.getElementById('si-'+hdr.id);
      if(el){
        var bar = el.querySelector('.sending-bar');
        if(bar) bar.style.width = Math.round(tf.received/tf.total*100)+'%';
      }
      // Hub relay
      if(role==='hub') relayExcept(buf.buffer, fromId);
    }
  }catch(e){}
}

// ═══════════════════════════════════════════════════════════
//  SHELF UI
// ═══════════════════════════════════════════════════════════
function addShelfItem(item, isMine){
  document.getElementById('shelf-empty').style.display = 'none';

  var div = document.createElement('div');
  div.className = 'shelf-item';
  div.id = 'si-' + item.id;

  var fromLabel = isMine ? 'You' : (item.from || 'Room');
  var fromClass = isMine ? 'item-from mine' : 'item-from';

  if(item.type === 'text'){
    div.innerHTML =
      '<div class="item-icon">&#128172;</div>' +
      '<div class="item-body">' +
        '<div class="item-meta"><span class="'+fromClass+'">'+esc(fromLabel)+'</span><span>'+esc(item.time)+'</span></div>' +
        '<div class="item-text-body">'+esc(item.text)+'</div>' +
      '</div>' +
      '<div class="item-actions">'+
        '<button class="copy-btn" onclick="copyText(this,'+JSON.stringify(item.text)+')">Copy</button>'+
      '</div>';
  } else {
    // File item
    var sizeStr  = fmtSize(item.size);
    var saveHtml = isMine
      ? '' // sender gets save link once blob is ready — added after read
      : '<a class="save-btn" style="opacity:.4;pointer-events:none;">Receiving\u2026</a>';

    var barHtml = '<div class="sending-bar-wrap"><div class="sending-bar" style="width:'+(isMine?'100':'0')+'%"></div></div>';

    div.innerHTML =
      '<div class="item-icon">'+fileIcon(item.mime)+'</div>' +
      '<div class="item-body">' +
        '<div class="item-name">'+esc(item.name)+'</div>' +
        '<div class="item-meta"><span>'+sizeStr+'</span><span class="'+fromClass+'">'+esc(fromLabel)+'</span><span>'+esc(item.time)+'</span></div>' +
        (isMine ? barHtml : barHtml) +
      '</div>' +
      '<div class="item-actions">' +
        (isMine
          ? '<a class="save-btn" style="opacity:.3;pointer-events:none;">Processing\u2026</a>'
          : saveHtml) +
      '</div>';

    // If sender and no peers, set download link immediately after blob is set
    // (handled in sendFiles after FileReader loads)
  }

  // Prepend so newest is at top
  var shelf = document.getElementById('shelf');
  shelf.insertBefore(div, shelf.firstChild.nextSibling || null); // after empty msg
  // Actually prepend properly
  document.getElementById('shelf').prepend(div);
}

// ═══════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════
function getTargets(){
  if(role === 'hub') return Object.values(peerConns).filter(function(c){return c.open;});
  if(role === 'peer' && hubConn && hubConn.open) return [hubConn];
  return [];
}

function relayExcept(data, exceptId){
  Object.entries(peerConns).forEach(function(e){
    var id=e[0], conn=e[1];
    if(id !== exceptId && conn.open){ try{conn.send(data);}catch(x){} }
  });
}

function broadcastControl(obj){
  var data = enc(obj);
  Object.values(peerConns).forEach(function(c){ try{c.send(data);}catch(e){} });
}

function tryParse(raw){
  try{
    var t;
    if(raw instanceof ArrayBuffer)   t = new TextDecoder().decode(raw);
    else if(raw instanceof Uint8Array) t = new TextDecoder().decode(raw);
    else if(typeof raw === 'string')   t = raw;
    else return null;
    var s = t.trim();
    return s.charAt(0) === '{' ? JSON.parse(s) : null;
  }catch(e){ return null; }
}

function enc(o)    { return new TextEncoder().encode(JSON.stringify(o)); }
function encHdr(o) { return new TextEncoder().encode(JSON.stringify(o).padEnd(256,' ')); }
function uid()     { return crypto.randomUUID(); }
function nowTime(){
  var n=new Date();
  return n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtSize(b){
  if(b<1024) return b+' B';
  if(b<1048576) return (b/1024).toFixed(1)+' KB';
  return (b/1048576).toFixed(1)+' MB';
}
function fileIcon(m){
  if(!m) return '\uD83D\uDCC4';
  if(m.startsWith('image/')) return '\uD83D\uDDBC';
  if(m.startsWith('video/')) return '\uD83C\uDFAC';
  if(m.startsWith('audio/')) return '\uD83C\uDFB5';
  if(m.includes('pdf'))       return '\uD83D\uDCD5';
  if(m.includes('zip')||m.includes('tar')) return '\uD83D\uDCE6';
  if(m.includes('text'))      return '\uD83D\uDCDD';
  return '\uD83D\uDCC4';
}

function setStat(state, text){
  var d=document.getElementById('sdot'), t=document.getElementById('stext');
  if(d) d.className='sdot '+state;
  if(t) t.textContent=text;
}
function setCount(n){
  memberCount = n;
  document.getElementById('member-count').textContent = n;
}
function toast(msg, dur){
  var el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('on');
  clearTimeout(el._t); el._t=setTimeout(function(){el.classList.remove('on');},dur||2500);
}

function copyText(btn, text){
  navigator.clipboard.writeText(text).then(function(){
    btn.textContent='Copied!'; btn.classList.add('copied');
    setTimeout(function(){ btn.textContent='Copy'; btn.classList.remove('copied'); },2000);
  }).catch(function(){
    var ta=document.createElement('textarea'); ta.value=text;
    ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    btn.textContent='Copied!'; btn.classList.add('copied');
    setTimeout(function(){ btn.textContent='Copy'; btn.classList.remove('copied'); },2000);
  });
}

// ═══════════════════════════════════════════════════════════
//  EVENT WIRING
// ═══════════════════════════════════════════════════════════
function wireEvents(){
  // Drop zone
  var dz = document.getElementById('drop-zone');
  dz.addEventListener('dragover',  function(e){ e.preventDefault(); dz.classList.add('over'); });
  dz.addEventListener('dragleave', function(){ dz.classList.remove('over'); });
  dz.addEventListener('drop',      function(e){ e.preventDefault(); dz.classList.remove('over'); sendFiles(e.dataTransfer.files); });
  dz.addEventListener('click',     function(){ document.getElementById('file-input').click(); });
  document.getElementById('file-input').addEventListener('change', function(e){
    if(e.target.files.length) sendFiles(e.target.files);
    e.target.value = '';
  });

  // Text
  var ti=document.getElementById('text-input'), sb=document.getElementById('send-text-btn'), cc=document.getElementById('char-count');
  ti.addEventListener('input', function(){ cc.textContent = ti.value.length + ' / 5000'; });
  ti.addEventListener('keydown', function(e){ if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){ e.preventDefault(); sendText(); } });
  sb.addEventListener('click', sendText);
}
</script>
