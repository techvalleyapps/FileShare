<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>FileShare — Mobile</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#07070d; --bg2:#0e0e18; --bg3:#15151f; --bg4:#1c1c28;
  --border:rgba(255,255,255,.08); --border2:rgba(255,255,255,.15);
  --text:#eceaf8; --muted:#5e5b78; --muted2:#8c89a8;
  --accent:#7ee8a2; --accent2:#38d98a; --accentd:#1a6640;
  --blue:#6ab4f5; --warn:#f0a045; --danger:#e05a5a;
  --mono:'DM Mono',monospace; --sans:'Syne',sans-serif;
}
html,body { min-height:100dvh; background:var(--bg); color:var(--text); font-family:var(--sans); }

.topbar { display:flex; align-items:center; gap:10px; padding:14px 16px; border-bottom:1px solid var(--border); background:var(--bg); position:sticky; top:0; z-index:10; }
.logo { width:28px; height:28px; background:var(--accent); border-radius:7px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.logo svg { width:14px; height:14px; }
.brand { font-size:15px; font-weight:700; letter-spacing:-.02em; }
.status-pill { margin-left:auto; display:flex; align-items:center; gap:5px; padding:4px 10px; background:var(--bg3); border:1px solid var(--border2); border-radius:20px; font-family:var(--mono); font-size:10px; color:var(--muted2); }
.dot { width:6px; height:6px; border-radius:50%; background:var(--muted); flex-shrink:0; transition:background .3s; }
.dot.connecting { background:var(--warn); animation:blink 1s ease-in-out infinite; }
.dot.ready  { background:var(--accent); animation:blink 2s ease-in-out infinite; }
.dot.paired { background:var(--blue); }
.dot.error  { background:var(--danger); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }

.page { padding:16px; display:flex; flex-direction:column; gap:14px; max-width:480px; margin:0 auto; }

.card { background:var(--bg3); border:1px solid var(--border); border-radius:14px; padding:16px; }
.card-title { font-size:10px; font-family:var(--mono); color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin-bottom:12px; }

.drop-zone { border:2px dashed var(--border2); border-radius:12px; padding:32px 16px; text-align:center; cursor:pointer; transition:border-color .2s, background .2s; }
.drop-zone.over { border-color:var(--accent); background:rgba(126,232,162,.05); }
.drop-zone.disabled { opacity:.45; cursor:default; }
.drop-icon { font-size:32px; margin-bottom:10px; }
.drop-title { font-size:17px; font-weight:700; letter-spacing:-.02em; margin-bottom:4px; }
.drop-sub { font-size:12px; color:var(--muted2); font-family:var(--mono); }
.file-input { display:none; }

.id-row { display:flex; gap:8px; }
.id-input { flex:1; background:var(--bg4); border:1px solid var(--border2); border-radius:8px; padding:10px 12px; font-family:var(--mono); font-size:13px; color:var(--text); outline:none; transition:border-color .2s; }
.id-input:focus { border-color:var(--accent); }
.id-input::placeholder { color:var(--muted); }

.btn { padding:10px 16px; background:var(--accent); color:#05140c; border:none; border-radius:8px; font-family:var(--sans); font-size:13px; font-weight:700; cursor:pointer; transition:background .15s,transform .1s; white-space:nowrap; }
.btn:hover { background:#9ef5b8; }
.btn:active { transform:scale(.97); }
.btn.danger { background:transparent; color:var(--danger); border:1px solid var(--danger); }
.btn.danger:hover { background:rgba(224,90,90,.1); }

.conn-banner { display:none; background:rgba(106,180,245,.08); border:1px solid rgba(106,180,245,.25); border-radius:10px; padding:12px 14px; align-items:center; gap:10px; }
.conn-banner.visible { display:flex; }
.dot-blue { width:8px; height:8px; border-radius:50%; background:var(--blue); flex-shrink:0; }
.conn-banner p { font-size:12px; font-family:var(--mono); color:var(--blue); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

.tf-list { display:flex; flex-direction:column; gap:8px; }
.tf-item { background:var(--bg4); border:1px solid var(--border); border-radius:10px; padding:12px 14px; display:flex; align-items:center; gap:10px; }
.tf-icon { font-size:20px; flex-shrink:0; }
.tf-info { flex:1; min-width:0; }
.tf-name { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:2px; }
.tf-meta { font-size:11px; color:var(--muted2); font-family:var(--mono); display:flex; gap:8px; }
.tf-bar-wrap { height:3px; background:var(--bg); border-radius:2px; margin-top:6px; overflow:hidden; }
.tf-bar { height:100%; background:var(--accent); border-radius:2px; transition:width .15s; }
.tf-status { flex-shrink:0; font-size:10px; font-family:var(--mono); padding:3px 8px; border-radius:4px; }
.ts-send { background:rgba(106,180,245,.12); color:var(--blue); }
.ts-recv { background:rgba(126,232,162,.1); color:var(--accent); }
.ts-done { background:rgba(126,232,162,.12); color:var(--accent2); }
.dl-btn { padding:5px 10px; background:var(--bg); border:1px solid var(--border2); border-radius:6px; font-size:11px; font-family:var(--mono); color:var(--accent); text-decoration:none; display:inline-block; transition:background .15s; }
.dl-btn:hover { background:var(--accentd); }

.info-box { background:rgba(240,160,69,.08); border:1px solid rgba(240,160,69,.25); border-radius:10px; padding:12px 14px; font-size:12px; font-family:var(--mono); color:var(--warn); line-height:1.7; }

.desktop-link { display:block; text-align:center; margin-top:4px; font-size:11px; font-family:var(--mono); color:var(--muted); text-decoration:none; }
.desktop-link:hover { color:var(--accent); }

.toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--bg3); border:1px solid var(--border2); border-radius:8px; padding:10px 18px; font-size:12px; font-family:var(--mono); opacity:0; transition:opacity .25s,transform .25s; pointer-events:none; z-index:999; white-space:nowrap; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <svg viewBox="0 0 14 14" fill="none">
      <path d="M1 7h12M7 1l6 6-6 6" stroke="#05140c" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <span class="brand">FileShare</span>
  <div class="status-pill">
    <div class="dot connecting" id="dot"></div>
    <span id="status-text">Connecting&hellip;</span>
  </div>
</div>

<div class="page">

  <div class="conn-banner" id="conn-banner">
    <div class="dot-blue"></div>
    <p id="conn-label">Connected</p>
    <button class="btn danger" id="disc-btn" style="padding:6px 10px;font-size:11px">Disconnect</button>
  </div>

  <div class="card">
    <div class="card-title">Send files to other device</div>
    <div class="drop-zone disabled" id="drop-zone">
      <input type="file" class="file-input" id="file-input" multiple>
      <div class="drop-icon">&#8679;</div>
      <div class="drop-title">Tap to pick files</div>
      <div class="drop-sub" id="drop-sub">Connect first</div>
    </div>
  </div>

  <div class="card" id="connect-card">
    <div class="card-title">Connect by Peer ID</div>
    <div class="id-row">
      <input class="id-input" id="peer-input" placeholder="Paste peer ID&hellip;">
      <button class="btn" id="join-btn">Join</button>
    </div>
  </div>

  <div class="card" id="tf-card" style="display:none">
    <div class="card-title">Transfers</div>
    <div class="tf-list" id="tf-list"></div>
  </div>

  <div class="info-box" id="info-box">
    Open FileShare on your computer, then scan the QR code or paste the Peer ID shown there.
    Files transfer directly — nothing goes to any server.
  </div>

  <a href="index.html" class="desktop-link">&#8592; Open desktop view</a>

</div>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
let peer = null, conn = null, myId = null;
const CHUNK = 64 * 1024;
const incoming = {};

window.addEventListener('DOMContentLoaded', () => { wireButtons(); initPeer(); });

function initPeer() {
  setStatus('connecting', 'Connecting\u2026');
  peer = new Peer({ debug: 0, config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] } });
  peer.on('open', id => {
    myId = id;
    setStatus('ready', 'Ready');
    const targetId = window.__AUTO_PEER__ || new URLSearchParams(location.search).get('peer');
    if (targetId && targetId !== id) connectTo(targetId);
  });
  peer.on('connection', c => handleConn(c));
  peer.on('error', err => { setStatus('error', 'Error: ' + err.type); toast('Error: ' + err.type, 4000); });
  peer.on('disconnected', () => { setTimeout(() => peer && !peer.destroyed && peer.reconnect(), 2000); });
}

function wireButtons() {
  document.getElementById('join-btn').addEventListener('click', () => connectTo(document.getElementById('peer-input').value.trim()));
  document.getElementById('peer-input').addEventListener('keydown', e => { if(e.key==='Enter') connectTo(document.getElementById('peer-input').value.trim()); });
  document.getElementById('disc-btn').addEventListener('click', disconnect);
  const dz = document.getElementById('drop-zone');
  dz.addEventListener('click', () => { if(conn&&conn.open) document.getElementById('file-input').click(); });
  dz.addEventListener('dragover',  e => { e.preventDefault(); if(conn&&conn.open) dz.classList.add('over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('over'));
  dz.addEventListener('drop',      e => { e.preventDefault(); dz.classList.remove('over'); if(conn&&conn.open) sendFiles(e.dataTransfer.files); });
  document.getElementById('file-input').addEventListener('change', e => { if(e.target.files.length) sendFiles(e.target.files); e.target.value=''; });
}

function connectTo(id) {
  if (!id) { toast('Enter a Peer ID'); return; }
  if (!myId) { toast('Still initialising\u2026'); return; }
  if (id === myId) { toast("That\u2019s your own ID!"); return; }
  toast('Connecting\u2026');
  handleConn(peer.connect(id, { reliable:true, serialization:'raw' }));
}

function handleConn(c) {
  if (conn && conn.open) { c.close(); return; }
  conn = c;
  c.on('open', () => {
    setStatus('paired', 'Connected');
    document.getElementById('conn-banner').classList.add('visible');
    document.getElementById('conn-label').textContent = 'Connected to ' + c.peer.slice(0,16) + '\u2026';
    document.getElementById('drop-zone').classList.remove('disabled');
    document.getElementById('drop-sub').textContent = 'Any file \u00b7 Any size';
    document.getElementById('info-box').style.display = 'none';
    toast('Connected! Tap to send files.');
  });
  c.on('data', handleData);
  c.on('close', onDisc);
  c.on('error', () => onDisc());
}

function disconnect() { if(conn) conn.close(); onDisc(); }

function onDisc() {
  conn = null;
  setStatus('ready', 'Disconnected');
  document.getElementById('conn-banner').classList.remove('visible');
  document.getElementById('drop-zone').classList.add('disabled');
  document.getElementById('drop-sub').textContent = 'Connect first';
  document.getElementById('info-box').style.display = '';
  toast('Disconnected');
}

function sendFiles(files) {
  if (!conn||!conn.open) { toast('Not connected'); return; }
  [...files].forEach(file => {
    const id = crypto.randomUUID();
    addTf({ id, name:file.name, size:file.size, mime:file.type, dir:'send' });
    conn.send(new TextEncoder().encode(JSON.stringify({ type:'FILE_META', transferId:id, name:file.name, size:file.size, mime:file.type||'application/octet-stream', chunks:Math.ceil(file.size/CHUNK) })));
    const reader = new FileReader();
    reader.onload = () => {
      const buf = reader.result, total = Math.ceil(buf.byteLength/CHUNK);
      let i = 0;
      function next() {
        if (!conn||!conn.open) return;
        const hdr = new TextEncoder().encode(JSON.stringify({type:'CHUNK',transferId:id,index:i}).padEnd(256,' '));
        const slice = buf.slice(i*CHUNK,(i+1)*CHUNK);
        const msg = new Uint8Array(hdr.byteLength+slice.byteLength);
        msg.set(hdr); msg.set(new Uint8Array(slice),hdr.byteLength);
        conn.send(msg.buffer);
        updateTf(id,{progress:Math.round(++i/total*100)});
        if (i<total) setTimeout(next,0);
        else { conn.send(new TextEncoder().encode(JSON.stringify({type:'FILE_DONE',transferId:id}))); updateTf(id,{status:'done',progress:100}); toast('Sent: '+file.name); }
      }
      next();
    };
    reader.readAsArrayBuffer(file);
  });
}

function handleData(raw) {
  let buf;
  if (raw instanceof ArrayBuffer) buf = new Uint8Array(raw);
  else if (raw instanceof Blob) { raw.arrayBuffer().then(handleData); return; }
  else { try { handleMsg(JSON.parse(raw)); } catch(e){} return; }
  try { const t=new TextDecoder().decode(buf).trim(); if(t.startsWith('{')){ handleMsg(JSON.parse(t)); return; } } catch(e){}
  try {
    const hdr = JSON.parse(new TextDecoder().decode(buf.slice(0,256)).trim());
    if (hdr.type==='CHUNK') { const tf=incoming[hdr.transferId]; if(!tf)return; tf.chunks[hdr.index]=buf.slice(256); tf.received++; updateTf(hdr.transferId,{progress:Math.round(tf.received/tf.total*100)}); }
  } catch(e){}
}

function handleMsg(msg) {
  if (msg.type==='FILE_META') { incoming[msg.transferId]={name:msg.name,size:msg.size,mime:msg.mime,total:msg.chunks,chunks:new Array(msg.chunks),received:0}; addTf({id:msg.transferId,name:msg.name,size:msg.size,mime:msg.mime,dir:'recv'}); }
  if (msg.type==='FILE_DONE') {
    const tf=incoming[msg.transferId]; if(!tf)return;
    const blob=new Blob(tf.chunks.map(c=>new Uint8Array(c)),{type:tf.mime||'application/octet-stream'});
    const url=URL.createObjectURL(blob);
    updateTf(msg.transferId,{status:'done',progress:100,dlUrl:url,dlName:tf.name});
    delete incoming[msg.transferId];
    toast('Received: '+tf.name);
  }
}

function setStatus(s,t) { document.getElementById('dot').className='dot '+s; document.getElementById('status-text').textContent=t; }
function toast(msg,dur=2500) { const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),dur); }
function fileIcon(m) { if(!m)return'\uD83D\uDCC4'; if(m.startsWith('image/'))return'\uD83D\uDDBC'; if(m.startsWith('video/'))return'\uD83C\uDFAC'; if(m.startsWith('audio/'))return'\uD83C\uDFB5'; if(m.includes('pdf'))return'\uD83D\uDCD5'; if(m.includes('zip')||m.includes('tar'))return'\uD83D\uDCE6'; if(m.includes('text'))return'\uD83D\uDCDD'; return'\uD83D\uDCC4'; }
function fmtSize(b) { if(b<1024)return b+' B'; if(b<1048576)return(b/1024).toFixed(1)+' KB'; return(b/1048576).toFixed(1)+' MB'; }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function addTf(tf) {
  document.getElementById('tf-card').style.display='';
  const div=document.createElement('div'); div.className='tf-item'; div.id='tf-'+tf.id;
  div.innerHTML=`<div class="tf-icon">${fileIcon(tf.mime)}</div><div class="tf-info"><div class="tf-name">${esc(tf.name)}</div><div class="tf-meta"><span>${fmtSize(tf.size)}</span><span id="tfp-${tf.id}">0%</span></div><div class="tf-bar-wrap"><div class="tf-bar" id="tfb-${tf.id}" style="width:0%"></div></div></div><div class="tf-status ts-${tf.dir==='send'?'send':'recv'}" id="tfs-${tf.id}">${tf.dir==='send'?'Sending':'Receiving'}</div>`;
  document.getElementById('tf-list').prepend(div);
}

function updateTf(id,ch) {
  const el=document.getElementById('tf-'+id); if(!el)return;
  if(ch.progress!==undefined){ const b=document.getElementById('tfb-'+id),p=document.getElementById('tfp-'+id); if(b)b.style.width=ch.progress+'%'; if(p)p.textContent=ch.progress+'%'; }
  if(ch.status==='done'){
    const st=document.getElementById('tfs-'+id),wrap=el.querySelector('.tf-bar-wrap');
    if(st){st.textContent='Done';st.className='tf-status ts-done';}
    if(wrap)wrap.style.display='none';
    if(ch.dlUrl){ const a=document.createElement('a'); a.href=ch.dlUrl; a.download=ch.dlName||'file'; a.className='dl-btn'; a.textContent='Save'; el.appendChild(a); a.click(); }
  }
}
</script>
</body>
</html>
